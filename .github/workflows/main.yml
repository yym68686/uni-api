name: Docker Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - main.py
      - fugue_observability.py
      - db.py
      - routing.py
      - upstream.py
      - utils.py
      - core/**
      - core
      - static/**
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - uv.lock
      - docker-compose.yml
      - .github/workflows/main.yml
      - .github/workflows/release.yml
      - .gitmodules
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive
        token: ${{ secrets.PACK_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1.6.0

    - name: Login to Docker Hub
      uses: docker/login-action@v3.0.0
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PACK_TOKEN }}

    - name: Get and Bump Version
      id: bump_version
      run: |
        VERSION=$(grep "^version = " pyproject.toml | awk -F'"' '{print $2}')
        echo "Current version: $VERSION"
        IFS='.' read -ra VERSION_PARTS <<< "$VERSION"
        PATCH=$((VERSION_PARTS[2] + 1))
        NEW_VERSION="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$PATCH"
        echo "New version: $NEW_VERSION"
        sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" pyproject.toml
        NEW_VERSION="$NEW_VERSION" python - <<'PY'
        from pathlib import Path
        import os

        lock_path = Path("uv.lock")
        lines = lock_path.read_text().splitlines()
        in_uni_api_package = False
        for index, line in enumerate(lines):
            if line == "[[package]]":
                in_uni_api_package = False
                continue
            if line == 'name = "uni-api"':
                in_uni_api_package = True
                continue
            if in_uni_api_package and line.startswith("version = "):
                lines[index] = f'version = "{os.environ["NEW_VERSION"]}"'
                break
        else:
            raise SystemExit("uni-api package version not found in uv.lock")

        lock_path.write_text("\n".join(lines) + "\n")
        PY
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Commit version bump
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add pyproject.toml uv.lock
        git commit -m "📖 Bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
        git push

    - name: Build and push Docker image
      uses: docker/build-push-action@v2.7.0
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          yym68686/uni-api:latest
          yym68686/uni-api:${{ steps.bump_version.outputs.new_version }}
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ steps.bump_version.outputs.new_version }}
